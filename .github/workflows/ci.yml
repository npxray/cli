name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - run: bun run fmt:check
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - run: npm pack --dry-run
